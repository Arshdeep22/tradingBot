name: 🤖 Trading Bot - Auto Runner

# Runs every 5 minutes during Indian market hours (9:15 AM - 3:30 PM IST)
# IST is UTC+5:30, so:
#   9:15 AM IST = 3:45 AM UTC
#   3:30 PM IST = 10:00 AM UTC
# Cron runs every 5 min from 3:45 to 10:00 UTC (Mon-Fri)

on:
  schedule:
    # Every 5 minutes during market hours (UTC times for IST market)
    - cron: '*/5 3-10 * * 1-5'  # Mon-Fri, 3:00-10:59 UTC (8:30 AM - 4:29 PM IST)
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - check-only
          - scan-only
          - force

# Grant write permissions so the bot can push commits
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Only run during actual market hours (fine-tuned in the script)
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 📂 Restore Database
        uses: actions/cache@v4
        with:
          path: database/trades.db
          key: trading-db-${{ github.run_id }}
          restore-keys: |
            trading-db-
      
      - name: 🤖 Run Trading Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          mkdir -p logs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            if [ "$MODE" = "check-only" ]; then
              python bot_runner.py --check-only
            elif [ "$MODE" = "scan-only" ]; then
              python bot_runner.py --scan-only
            elif [ "$MODE" = "force" ]; then
              python bot_runner.py --force
            else
              python bot_runner.py
            fi
          else
            python bot_runner.py
          fi
      
      - name: 💾 Save Database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: database/trades.db
          key: trading-db-${{ github.run_id }}
      
      - name: 📊 Commit Database Changes
        if: always()
        run: |
          git config --local user.email "bot@tradingbot.local"
          git config --local user.name "Trading Bot"
          
          # Add database file
          git add database/trades.db || true
          git add logs/ || true
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Bot run: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📋 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: logs/bot_runner.log
          retention-days: 7