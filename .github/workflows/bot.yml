name: Trading Bot - Auto Monitor

# Runs every 5 minutes during Indian market hours (Mon-Fri)
# IST 9:15-15:30 = UTC 3:45-10:00
on:
  schedule:
    # Every 5 minutes, Mon-Fri, during market hours (UTC 3:45 - 10:00)
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run Bot (Check Orders + Monitor Trades + Scan Zones)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python bot_runner.py --force

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7